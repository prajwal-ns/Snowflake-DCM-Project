name: DCM Plan on PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'Salesforce_DCM/**'

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write private key file
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > key.p8

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1
        with:
          cli-version: latest
          default-config-file-path: .snowflake/config.toml

      - name: Fetch Git Repo in Snowflake
        run: |
          snow sql -q "ALTER GIT REPOSITORY INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO FETCH;"

      - name: Run DCM Plan (DEV)
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT DEV_SF_DB.PUBLIC.SALESFORCE_DCM_DEV
              PLAN
              USING CONFIGURATION dev
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/${{ github.head_ref }}/Salesforce_DCM;
          " --format json > plan_output.json
          cat plan_output.json

      - name: Post Plan Output to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## DCM Plan Output (DEV)\n```json\n' + plan.substring(0, 60000) + '\n```'
            });
