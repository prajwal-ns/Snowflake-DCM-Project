name: DCM Deploy on Merge

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'manifest.yml'

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_ROLE: DCM_ADMIN
      SNOWFLAKE_WAREHOUSE: COMPUTE_WH
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Fetch Git Repo in Snowflake
        run: |
          snow sql -q "ALTER GIT REPOSITORY INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO FETCH;" -x

      - name: Plan DEV
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT DEV_SF_DB.PUBLIC.SALESFORCE_DCM_DEV
              PLAN
              USING CONFIGURATION dev
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          " -x

      - name: Deploy DEV
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT DEV_SF_DB.PUBLIC.SALESFORCE_DCM_DEV
              DEPLOY AS \"CI/CD deploy - commit ${{ github.sha }}\"
              USING CONFIGURATION dev
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          " -x

      - name: Verify DEV Deployment
        run: |
          snow sql -q "SHOW ENTITIES IN DCM PROJECT DEV_SF_DB.PUBLIC.SALESFORCE_DCM_DEV;" -x

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production
    env:
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_ROLE: DCM_ADMIN
      SNOWFLAKE_WAREHOUSE: COMPUTE_WH
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Fetch Git Repo in Snowflake
        run: |
          snow sql -q "ALTER GIT REPOSITORY INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO FETCH;" -x

      - name: Plan PROD
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT PROD_SF_DB.PUBLIC.SALESFORCE_DCM_PROD
              PLAN
              USING CONFIGURATION prod
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          " -x

      - name: Deploy PROD
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT PROD_SF_DB.PUBLIC.SALESFORCE_DCM_PROD
              DEPLOY AS \"CI/CD deploy - commit ${{ github.sha }}\"
              USING CONFIGURATION prod
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          " -x

      - name: Verify PROD Deployment
        run: |
          snow sql -q "SHOW ENTITIES IN DCM PROJECT PROD_SF_DB.PUBLIC.SALESFORCE_DCM_PROD;" -x
