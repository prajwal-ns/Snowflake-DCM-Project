name: DCM Deploy on Merge

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'manifest.yml'

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write private key file
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > key.p8

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v3

      - name: Fetch Git Repo in Snowflake
        run: |
          snow sql -q "ALTER GIT REPOSITORY INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO FETCH;"

      - name: Plan DEV
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT DEV_SF_DB.PUBLIC.SALESFORCE_DCM_DEV
              PLAN
              USING CONFIGURATION dev
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          "

      - name: Deploy DEV
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT DEV_SF_DB.PUBLIC.SALESFORCE_DCM_DEV
              DEPLOY AS \"CI/CD deploy - commit ${{ github.sha }}\"
              USING CONFIGURATION dev
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          "

      - name: Verify DEV Deployment
        run: |
          snow sql -q "SHOW ENTITIES IN DCM PROJECT DEV_SF_DB.PUBLIC.SALESFORCE_DCM_DEV;"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Write private key file
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > key.p8

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v3

      - name: Fetch Git Repo in Snowflake
        run: |
          snow sql -q "ALTER GIT REPOSITORY INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO FETCH;"

      - name: Plan PROD
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT PROD_SF_DB.PUBLIC.SALESFORCE_DCM_PROD
              PLAN
              USING CONFIGURATION prod
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          "

      - name: Deploy PROD
        run: |
          snow sql -q "
            EXECUTE DCM PROJECT PROD_SF_DB.PUBLIC.SALESFORCE_DCM_PROD
              DEPLOY AS \"CI/CD deploy - commit ${{ github.sha }}\"
              USING CONFIGURATION prod
            FROM
              @INTEGRATIONS.GITHUB.SALESFORCE_DCM_REPO/branches/main/;
          "

      - name: Verify PROD Deployment
        run: |
          snow sql -q "SHOW ENTITIES IN DCM PROJECT PROD_SF_DB.PUBLIC.SALESFORCE_DCM_PROD;"
